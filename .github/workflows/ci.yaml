name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create bulid output dir
        run: |
          mkdir ./dist
          mkdir ./dist/oci-images
          mkdir ./dist/sbom

      - name: Run `apko build`
        uses: docker://cgr.dev/chainguard/apko@sha256:994ffaf86e3141b55cfd9cdbd14e7f8f94f9eb2f45266e6adc0a6a409b270aa1 # latest
        with:
          args: build --lockfile kubectl-1.36.lock.json kubectl-1.36.yaml k8s-backup-tool:kubectl-1.36 ./dist/oci-images

      - name: Fix ownership of apko output
        run: sudo chown -R "$(id -u):$(id -g)" ./dist/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.2
        with:
          name: dist
          path: dist
          retention-days: 1

  publish:
    needs: build
    if: github.ref == 'refs/heads/master'

    permissions:
      packages: write

    runs-on: ubuntu-24.04

    steps:
      - name: Setup `crane`
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Setup `cosign`
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      # N.B. Cosign should use the same credential store, so we do not need to authenticate again.
      - name: Authenticate with ghcr.io container registry
        run: crane auth login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: push images
        run: crane push --index dist/oci-images ghcr.io/${{ github.repository }}:kubectl-1.36 --image-refs digest.txt

      # TODO: Attach SBOMs
      # TODO: Sign images



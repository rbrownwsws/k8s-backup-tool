name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      REPO: https://github.com/${{ github.event.pull_request.head.repo.full_name || github.repository }}
      REVISION: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create build output dir
        run: |
          mkdir ./dist
          mkdir ./dist/oci-images
          mkdir ./dist/sboms

      - name: Run `apko build`
        uses: docker://cgr.dev/chainguard/apko@sha256:994ffaf86e3141b55cfd9cdbd14e7f8f94f9eb2f45266e6adc0a6a409b270aa1 # latest
        with:
          args: >-
            build
            --vcs=false
            --annotations=org.opencontainers.image.source:${{ env.REPO }}
            --annotations=org.opencontainers.image.revision:${{ env.REVISION }}
            --sbom-path=dist/sboms
            --lockfile=kubectl-1.36.lock.json
            kubectl-1.36.yaml
            k8s-backup-tool:kubectl-1.36
            ./dist/oci-images

      - name: Fix ownership of apko output
        run: sudo chown -R "$(id -u):$(id -g)" ./dist/

      - name: Fix arch names of apko SBOMs
        run: |
          declare -A arch_map=( [x86_64]=amd64 [aarch64]=arm64 [armv7]=arm )

          for apk_arch in "${!arch_map[@]}"; do
            oci_arch="${arch_map[$apk_arch]}"
            src="dist/sboms/sbom-${apk_arch}.spdx.json"
            dst="dist/sboms/sbom-${oci_arch}.spdx.json"
            if [ -f "$src" ]; then
              mv "$src" "$dst"
            fi
          done

      - name: Upload OCI Images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.2
        with:
          name: oci-images
          path: dist/oci-images
          retention-days: 1

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.2
        with:
          name: sboms
          path: dist/sboms
          retention-days: 1

  publish-images:
    needs: build
    if: github.ref == 'refs/heads/master'

    permissions:
      packages: write

    runs-on: ubuntu-24.04

    steps:
      - name: Setup `crane`
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oci-images
          path: dist/oci-images

      - name: Authenticate with ghcr.io container registry
        run: crane auth login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: crane push --index dist/oci-images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:kubectl-1.36 --image-refs digest.txt

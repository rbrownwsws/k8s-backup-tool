name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      REPO: https://github.com/${{ github.event.pull_request.head.repo.full_name || github.repository }}
      REVISION: ${{ github.event.pull_request.head.sha || github.sha }}

    outputs:
      artifacts: ${{ steps.digests.outputs.artifacts}}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create build output dir
        run: |
          mkdir ./dist
          mkdir ./dist/oci-images
          mkdir ./dist/sboms

      - name: Run `apko build`
        uses: docker://cgr.dev/chainguard/apko@sha256:994ffaf86e3141b55cfd9cdbd14e7f8f94f9eb2f45266e6adc0a6a409b270aa1 # latest
        with:
          args: >-
            build
            --vcs=false
            --annotations=org.opencontainers.image.source:${{ env.REPO }}
            --annotations=org.opencontainers.image.revision:${{ env.REVISION }}
            --sbom-path=dist/sboms
            --lockfile=kubectl-1.36.lock.json
            kubectl-1.36.yaml
            k8s-backup-tool:kubectl-1.36
            ./dist/oci-images

      - name: Fix ownership of apko output
        run: sudo chown -R "$(id -u):$(id -g)" ./dist/

      - name: Fix arch names of apko SBOMs
        run: |
          declare -A arch_map=( [x86_64]=amd64 [aarch64]=arm64 [armv7]=arm )

          for apk_arch in "${!arch_map[@]}"; do
            oci_arch="${arch_map[$apk_arch]}"
            src="dist/sboms/sbom-${apk_arch}.spdx.json"
            dst="dist/sboms/sbom-${oci_arch}.spdx.json"
            if [ -f "$src" ]; then
              mv "$src" "$dst"
            fi
          done

      - name: Upload OCI Images
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.2
        with:
          name: oci-images
          path: dist/oci-images
          retention-days: 1

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.2
        with:
          name: sboms
          path: dist/sboms
          retention-days: 1

      - name: Capture image digests
        id: digests
        working-directory: dist/oci-images
        run: |
          INDEX_DIGEST="sha256:$(sha256sum index.json | cut -d ' ' -f1)"
          ARTIFACTS=$(jq -c --arg index_digest "$INDEX_DIGEST" '[{arch: "index", digest: $index_digest}] + [.manifests[] | {arch: .platform.architecture, digest: .digest}]' index.json)
          echo "artifacts=$ARTIFACTS" >> "$GITHUB_OUTPUT"

  push-images:
    needs: build
    if: github.ref == 'refs/heads/master'

    permissions:
      packages: write

    runs-on: ubuntu-24.04

    steps:
      - name: Setup `crane`
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Download OCI images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: oci-images
          path: dist/oci-images

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: crane push --index dist/oci-images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:kubectl-1.36

  attest-sbom:
    needs:
      - build
      - push-images
    if: github.ref == 'refs/heads/master'

    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
      artifact-metadata: write

    strategy:
      fail-fast: false
      matrix:
        artifact: ${{ fromJson(needs.build.outputs.artifacts) }}

    runs-on: ubuntu-24.04

    steps:
      - name: Download SBOMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sboms
          path: dist/sboms

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest SBOM (${{ matrix.artifact.arch }})
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ matrix.artifact.digest }}
          sbom-path: dist/sboms/sbom-${{ matrix.artifact.arch }}.spdx.json
          push-to-registry: true

  attest-provenance:
    needs:
      - build
      - push-images
    if: github.ref == 'refs/heads/master'

    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
      artifact-metadata: write

    strategy:
      fail-fast: false
      matrix:
        artifact: ${{ fromJson(needs.build.outputs.artifacts) }}

    runs-on: ubuntu-24.04

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest Provenance (${{ matrix.image.arch }})
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ matrix.artifact.digest }}
          push-to-registry: true
